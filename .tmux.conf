# bkahn - updated for tmux 3.x
# reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# change prefix
set-option -g prefix C-a
unbind-key C-b
bind-key C-a send-prefix

# use "v" and "s" to do vertical/horizontal splits, like vim
bind -r v split-window -v
bind -r s split-window -h

# use the vim motion keys to move between panes
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# keybind - kill-session with confirmation
bind-key \\ confirm-before -p "kill-session? (y/n)" kill-session

# Set status bar
set -g status-bg black
set -g status-fg white
set -g status-style bold                                        # was: status-attr bright
set -g status-left '#[fg=green]#H #[fg=black]• #[fg=green,bold]#(uname -r | cut -c 1-6)#[default]'
set -g status-right '#[fg=yellow]#(uptime | cut -d "," -f 2-)'

# Highlight active window
set-window-option -g window-status-current-style bg=red,bold   # was: -bg / -attr separate

# Set window notifications
setw -g monitor-activity on
set -g visual-activity on

# etc
set -g display-panes-time 3000
set-option -g repeat-time 700                                  # was: missing -g flag
set -g base-index 1
set -g pane-base-index 1

# Highlight active pane
set -g pane-border-style fg=colour239                          # was: pane-border-fg
set -g pane-active-border-style fg=colour208                   # was: pane-active-border-fg

set -g terminal-overrides 'xterm*:smcup@:rmcup@'
